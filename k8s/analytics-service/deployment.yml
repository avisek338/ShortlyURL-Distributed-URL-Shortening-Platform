apiVersion: apps/v1
kind: Deployment

metadata:
  name: analytics-service
  namespace: tiny-url

spec:
  replicas: 1

  selector:
    matchLabels:
      app: analytics-service

  template:
    metadata:
      labels:
        app: analytics-service

    spec:
      containers:
        - name: analytics-service
          image: analytics-service:v1
          imagePullPolicy: Never

          ports:
            - containerPort: 8080

          envFrom:
            - configMapRef:
                name: analytics-service-config

            - secretRef:
                name: analytics-service-secret